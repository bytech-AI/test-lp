<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test LP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
      color: #333;
      line-height: 1.8;
    }

    /* Header */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 1.4rem;
      font-weight: bold;
    }

    header nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 24px;
      font-size: 0.95rem;
    }

    header nav a:hover {
      opacity: 0.7;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #fff;
      text-align: center;
      padding: 100px 24px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 1.1rem;
      margin-bottom: 32px;
      opacity: 0.9;
    }

    .hero .btn {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 14px 40px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      transition: background 0.3s;
    }

    .hero .btn:hover {
      background: #c73650;
    }

    /* Features */
    .features {
      padding: 80px 24px;
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
    }

    .features h2 {
      font-size: 1.8rem;
      margin-bottom: 48px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
    }

    .feature-card {
      padding: 24px;
    }

    .feature-card .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .feature-card h3 {
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    .feature-card p {
      font-size: 0.95rem;
      color: #666;
    }

    /* About */
    .about {
      background: #f5f5f5;
      padding: 80px 24px;
      text-align: center;
    }

    .about h2 {
      font-size: 1.8rem;
      margin-bottom: 24px;
    }

    .about p {
      max-width: 640px;
      margin: 0 auto;
      color: #555;
    }

    /* Contact */
    .contact {
      padding: 80px 24px;
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    .contact h2 {
      font-size: 1.8rem;
      margin-bottom: 32px;
    }

    .contact form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }

    .contact label {
      font-size: 0.9rem;
      font-weight: bold;
    }

    .contact input,
    .contact textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    .contact textarea {
      height: 120px;
      resize: vertical;
    }

    .contact button {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .contact button:hover {
      background: #0f3460;
    }

    /* Footer */
    footer {
      background: #1a1a2e;
      color: #aaa;
      text-align: center;
      padding: 24px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Test LP</div>
    <nav>
      <a href="#features">特徴</a>
      <a href="#about">概要</a>
      <a href="#contact">お問い合わせ</a>
    </nav>
  </header>

  <section class="hero">
    <h1>あなたのビジネスを加速する</h1>
    <p>シンプルで使いやすいサービスを提供します</p>
    <a href="#contact" class="btn">お問い合わせ</a>
  </section>

  <section class="features" id="features">
    <h2>特徴</h2>
    <div class="features-grid">
      <div class="feature-card">
        <div class="icon">&#9889;</div>
        <h3>高速</h3>
        <p>圧倒的なスピードでビジネスの課題を解決します。</p>
      </div>
      <div class="feature-card">
        <div class="icon">&#128274;</div>
        <h3>安全</h3>
        <p>万全のセキュリティ対策で安心してご利用いただけます。</p>
      </div>
      <div class="feature-card">
        <div class="icon">&#128640;</div>
        <h3>簡単</h3>
        <p>直感的な操作で誰でもすぐに使い始められます。</p>
      </div>
    </div>
  </section>

  <section class="about" id="about">
    <h2>概要</h2>
    <p>私たちはお客様のビジネスを成功に導くために、最高品質のサービスを提供しています。チーム一丸となって、お客様の期待を超える体験をお届けします。</p>
  </section>

  <section class="contact" id="contact">
    <h2>お問い合わせ</h2>
    <form>
      <label for="name">お名前</label>
      <input type="text" id="name" placeholder="山田 太郎">

      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="example@mail.com">

      <label for="message">メッセージ</label>
      <textarea id="message" placeholder="お気軽にご連絡ください"></textarea>

      <button type="submit">送信する</button>
    </form>
  </section>

  <footer>
    &copy; 2026 Test LP. All rights reserved.
  </footer>

</body>
</html>
